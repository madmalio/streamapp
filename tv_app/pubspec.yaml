name: tv_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  # Core Application Plugins
  cupertino_icons: ^1.0.8
  http: ^1.6.0
  provider: ^6.1.5+1
  shared_preferences: ^2.5.5

  # Player Option A: Media Kit Stack (Verified Core Version Setup)
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: ^1.0.7

  # Player Option B: Modern VLC Stack
  flutter_vlc_player: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

# Keep this bypass active to handle the legacy progress bar issues cleanly
dependency_overrides:
  audio_video_progress_bar: ^2.0.1
